name: Build Linux Binary

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Attach built package to a GitHub Release"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag (required when upload_to_release=true), e.g. v0.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      BIN_NAME: tertrans
      TARGET_TRIPLE: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Build release
        run: cargo build --release --target $TARGET_TRIPLE

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/$TARGET_TRIPLE/release/$BIN_NAME dist/$BIN_NAME
          chmod +x dist/$BIN_NAME
          tar -C dist -czf dist/${BIN_NAME}-${TARGET_TRIPLE}.tar.gz $BIN_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tertrans-x86_64-unknown-linux-gnu
          path: dist/tertrans-x86_64-unknown-linux-gnu.tar.gz

      - name: Validate release inputs
        if: ${{ inputs.upload_to_release && inputs.release_tag == '' }}
        run: |
          echo "release_tag is required when upload_to_release=true"
          exit 1

      - name: Publish to GitHub Release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/tertrans-x86_64-unknown-linux-gnu.tar.gz
